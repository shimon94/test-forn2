<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ארט-ווד | ריהוט יוקרה ישראלי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@200;300;400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --champagne: #e8d5a3;
      --offwhite: #f0ece4;
      --muted: #8a8278;
      --bg: #0a0a0a;
      --bg-alt: #111111;
      --bg-card: #141414;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Heebo', sans-serif;
      background-color: var(--bg);
      color: var(--offwhite);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* Subtle film-grain overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.018;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* ---- NAV ---- */
    .nav-blur {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(10,10,10,0.92);
      border-bottom: 1px solid rgba(201,168,76,0.18);
    }

    /* ---- HERO ---- */
    .hero-section {
      position: relative;
      height: 100vh;
      min-height: 640px;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://scontent.ftlv5-1.fna.fbcdn.net/v/t39.30808-6/658261947_122160035246817739_8264953829864846765_n.jpg?_nc_cat=108&ccb=1-7&_nc_sid=7b2446&_nc_ohc=_1e5-nav1VgQ7kNvwF1AyJq&_nc_oc=AdqW5SEivXGU-tT-agBWVDMHGK96mJrjgPHJ4xVxZqEBmCwOYa1sqEzdeTyw3G0gCss&_nc_zt=23&_nc_ht=scontent.ftlv5-1.fna&_nc_gid=sXGAT334Jk-JI1mF1zEj4w&_nc_ss=7a32e&oh=00_AfxhSUmCLjGuVhb_YqLsFK_bO1ccje_LwANIM1dsmtCtNQ&oe=69CEFDDD');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(10,10,10,0.62) 0%, rgba(10,10,10,0.88) 100%);
    }
    #particles-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 1.5rem;
    }

    /* ---- GOLD RULE ---- */
    .gold-rule {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 1.25rem auto;
    }

    /* ---- STATS BAR ---- */
    .stats-bar {
      background: #111111;
      border-top: 1px solid rgba(201,168,76,0.12);
      border-bottom: 1px solid rgba(201,168,76,0.12);
    }
    .stat-divider {
      width: 1px;
      height: 36px;
      background: rgba(201,168,76,0.35);
      flex-shrink: 0;
    }

    /* ---- GALLERY ---- */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    @media (max-width: 768px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .gallery-grid { grid-template-columns: 1fr; }
    }
    .product-card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      height: 300px;
    }
    .product-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.55s ease;
    }
    .product-card:hover img {
      transform: scale(1.06);
    }
    .product-card .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,10,0);
      display: flex;
      align-items: flex-end;
      padding: 1.25rem;
      transition: background 0.4s ease, box-shadow 0.4s ease;
      box-shadow: inset 0 0 0 0px var(--gold);
    }
    .product-card:hover .card-overlay {
      background: rgba(10,10,10,0.62);
      box-shadow: inset 0 0 0 2px var(--gold);
    }
    .product-card .card-label {
      color: var(--offwhite);
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .product-card:hover .card-label {
      opacity: 1;
      transform: translateY(0);
    }

    /* ---- QUOTE STRIP ---- */
    .quote-strip {
      position: relative;
      overflow: hidden;
      min-height: 340px;
      display: flex;
      align-items: center;
    }
    .quote-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://scontent.ftlv5-1.fna.fbcdn.net/v/t39.30808-6/657588450_122159973710817739_7456793006720965212_n.jpg?_nc_cat=107&ccb=1-7&_nc_sid=7b2446&_nc_ohc=qpAowZPfgQwQ7kNvwEuXzFp&_nc_oc=Ado-wEZ5eGZc4Fs3Ua-b5NEyBfPbpkbNjP-A0XhYr0wJBo6sIUuKjr8HYlqFz7d-IHA&_nc_zt=23&_nc_ht=scontent.ftlv5-1.fna&_nc_gid=JzkZpzMjCNG6OiqAoQbagg&_nc_ss=7a32e&oh=00_Afx7_A7aX623n-SnBldhNUv8BpHB1fYW_Dy85AY6dYadpg&oe=69CEFD98');
      background-size: cover;
      background-position: center;
      filter: brightness(0.35) saturate(0.6);
    }

    /* ---- BRAND STORY ---- */
    .story-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 500px;
    }
    @media (max-width: 768px) {
      .story-grid { grid-template-columns: 1fr; }
    }
    .story-image-wrap {
      position: relative;
      min-height: 420px;
    }
    .story-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .story-image-frame {
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(201,168,76,0.4);
      pointer-events: none;
    }

    /* ---- FEATURE CARDS ---- */
    .feature-card {
      background: var(--bg-card);
      border-top: 3px solid var(--gold);
      padding: 2.5rem 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .feature-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    /* ---- PROCESS TIMELINE ---- */
    .process-steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      position: relative;
      gap: 2rem;
    }
    @media (max-width: 768px) {
      .process-steps { grid-template-columns: 1fr; }
      .process-line { display: none; }
    }
    .process-line {
      position: absolute;
      top: 28px;
      right: calc(16.66% + 28px);
      left: calc(16.66% + 28px);
      height: 1px;
      border-top: 2px dashed rgba(201,168,76,0.4);
      z-index: 0;
    }
    .step-number {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--gold);
      background: var(--bg-alt);
      position: relative;
      z-index: 1;
      margin: 0 auto 1.25rem;
    }

    /* ---- TESTIMONIALS ---- */
    .testimonial-card {
      background: var(--bg-card);
      border-right: 3px solid var(--gold);
      padding: 2rem 1.75rem;
    }
    .stars { color: var(--gold); letter-spacing: 0.1em; }

    /* ---- CTA FORM ---- */
    .form-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.25);
      color: var(--offwhite);
      padding: 0.8rem 1rem;
      width: 100%;
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.25s ease;
    }
    .form-input:focus {
      border-color: var(--gold);
    }
    .form-input::placeholder {
      color: var(--muted);
    }

    /* ---- BUTTONS ---- */
    .btn-gold {
      background: var(--gold);
      color: #0a0a0a;
      font-family: 'Heebo', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      padding: 0.85rem 2.25rem;
      border: none;
      cursor: pointer;
      transition: background 0.25s ease, transform 0.2s ease;
      display: inline-block;
      text-decoration: none;
    }
    .btn-gold:hover {
      background: var(--champagne);
      transform: translateY(-2px);
    }
    .btn-outline-gold {
      background: transparent;
      color: var(--gold);
      font-family: 'Heebo', sans-serif;
      font-weight: 400;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      padding: 0.85rem 2.25rem;
      border: 1px solid var(--gold);
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease;
      display: inline-block;
      text-decoration: none;
    }
    .btn-outline-gold:hover {
      background: rgba(201,168,76,0.1);
    }
    .btn-whatsapp {
      background: #25D366;
      color: #fff;
      font-family: 'Heebo', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      padding: 1rem 2.5rem;
      border: none;
      cursor: pointer;
      transition: background 0.25s ease, transform 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }
    .btn-whatsapp:hover {
      background: #1ebe5d;
      transform: translateY(-2px);
    }
    .btn-whatsapp-nav {
      background: #25D366;
      color: #fff;
      font-family: 'Heebo', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s;
    }
    .btn-whatsapp-nav:hover { background: #1ebe5d; }

    /* ---- FOOTER ---- */
    .footer-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
      align-items: center;
    }
    @media (max-width: 640px) {
      .footer-grid {
        grid-template-columns: 1fr;
        text-align: center;
      }
    }

    /* ---- SECTION UTILITY ---- */
    .section-label {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .section-heading {
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 700;
      color: var(--offwhite);
      line-height: 1.25;
    }
    .section-sub {
      font-size: 1rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.8;
      margin-top: 0.5rem;
    }
  </style>
</head>

// ---- PARTICLES CANVAS ----
function ParticlesCanvas() {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const particlesRef = useRef([]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Init 60 particles
    particlesRef.current = Array.from({ length: 60 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: 1.5 + Math.random() * 2.5,
      speed: 0.2 + Math.random() * 0.6,
      opacity: 0.1 + Math.random() * 0.35,
      drift: (Math.random() - 0.5) * 0.3,
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particlesRef.current.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201, 168, 76, ${p.opacity})`;
        ctx.fill();

        p.y -= p.speed;
        p.x += p.drift;

        if (p.y < -10) {
          p.y = canvas.height + 10;
          p.x = Math.random() * canvas.width;
        }
        if (p.x < -10) p.x = canvas.width + 10;
        if (p.x > canvas.width + 10) p.x = -10;
      });
      animRef.current = requestAnimationFrame(draw);
    }
    draw();

    return () => {
      cancelAnimationFrame(animRef.current);
      window.removeEventListener('resize', resize);
    };
  }, []);

  return (
    <canvas
      ref={canvasRef}
      id="particles-canvas"
      style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none', zIndex: 1 }}
    />
  );
}

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '1.5rem' }}>
          {reviews.map((r, i) => (
            <div className="testimonial-card" key={i}>
              <div className="stars" style={{ marginBottom: '1rem', fontSize: '1rem' }}>★★★★★</div>
              <p style={{ fontSize: '0.97rem', fontWeight: 300, color: '#d0c8be', lineHeight: 1.85, fontStyle: 'italic', marginBottom: '1.5rem' }}>
                "{r.text}"
              </p>
              <div style={{ fontSize: '0.82rem', fontWeight: 700, color: '#c9a84c' }}>{r.author}</div>
              <div style={{ fontSize: '0.75rem', fontWeight: 300, color: '#8a8278', letterSpacing: '0.1em' }}>{r.city}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ---- CTA / CONTACT ----
function Contact() {
  const [form, setForm] = useState({ name: '', phone: '', message: '' });
  const [sent, setSent] = useState(false);

  const handleChange = e => setForm(f => ({ ...f, [e.target.name]: e.target.value }));

  const handleSubmit = e => {
    e.preventDefault();
    setSent(true);
  };

  return (
    <section id="contact" style={{ background: 'linear-gradient(135deg, #0a0a0a 0%, #130f07 100%)', padding: '7rem 0', position: 'relative', overflow: 'hidden' }}>

      <div style={{ maxWidth: 720, margin: '0 auto', padding: '0 1.5rem', position: 'relative', zIndex: 1, textAlign: 'center' }}>
        <p className="section-label">צרו קשר היום</p>

        <a href="https://wa.me/972500000000" className="btn-whatsapp" style={{ marginBottom: '2rem', display: 'inline-flex' }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">

            <input className="form-input" name="phone" placeholder="טלפון" type="tel" value={form.phone} onChange={handleChange} required />
            <textarea className="form-input" name="message" placeholder="הודעה" rows={4} value={form.message} onChange={handleChange} required style={{ resize: 'vertical' }} />
